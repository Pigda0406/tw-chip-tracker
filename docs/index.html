<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大戶籌碼 吃貨/倒貨 偵測</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>大戶籌碼 吃貨 / 倒貨 偵測</h1>
    <p class="sub" id="meta">資料載入中…</p>
  </header>

  <section class="controls">
    <label>大戶門檻
      <select id="level">
        <option value="big400">400 張</option>
        <option value="big1000">1000 張(千張)</option>
      </select>
    </label>
    <label>觀察
      <select id="mode">
        <option value="accumulate">大戶吃貨</option>
        <option value="distribute">大戶倒貨</option>
        <option value="all">全部</option>
      </select>
    </label>
    <label>比較
      <select id="span"></select>
    </label>
    <span class="market-group">
      <label class="chk"><input type="checkbox" id="mTWSE" checked /> 上市</label>
      <label class="chk"><input type="checkbox" id="mTPEX" checked /> 上櫃</label>
    </span>
    <span class="count" id="count"></span>
  </section>

  <div class="banner" id="banner" hidden></div>

  <main>
    <div class="table-wrap">
      <table id="tbl">
        <thead><tr id="headRow"></tr></thead>
        <tbody id="body"></tbody>
      </table>
    </div>
    <p class="empty" id="empty" hidden>沒有符合條件的股票。試著切換門檻、觀察模式或市場。</p>
  </main>

  <footer>
    <p><strong>吃貨</strong>=大戶持股比例明顯上升(股東人數未增),籌碼集中;<strong>倒貨</strong>=大戶比例下降(人數未減),籌碼分散。大戶=集保 ≥400張 / ≥1000張 級距占比。可用上方「比較」選幾期前。</p>
    <p class="disc">資料來源:臺灣集中保管結算所(TDCC)股權分散表,每週更新。集保級距未區分外資託管/內部人/大額散戶,請看「變化」而非絕對值。本頁僅供參考,<strong>非投資建議</strong>。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
